# Alpharius — Alpha Legion terminal theme for Kitty
# Generated from themes/alpharius.json by scripts/export-kitty-theme.ts
# Do not edit manually — re-run the script after palette changes.
#
# Usage:
#   include /path/to/omegon/themes/alpharius.conf
# or copy into ~/.config/kitty/current-theme.conf

# ── Core palette ─────────────────────────────────────────────────────────
background            #06080e
foreground            #c4d8e4

# ── Cursor ───────────────────────────────────────────────────────────────
cursor                #2ab4c8
cursor_text_color     #06080e

# ── Selection ────────────────────────────────────────────────────────────
selection_background  #102030
selection_foreground  #c4d8e4

# ── URL underline colour ─────────────────────────────────────────────────
url_color             #1a8898

# ── ANSI 16-colour palette ───────────────────────────────────────────────
# Mapped to alpharius semantic roles so shell prompts and system tools
# (oh-my-bash, ls, git diff) align with the alpharius colour vocabulary.

color0   #06080e
color1   #c83030
color2   #1ab878
color3   #b89020
color4   #1a8898
color5   #6060c0
color6   #4aa8c0
color7   #607888
color8   #344858
color9   #e04040
color10  #20d890
color11  #d4aa30
color12  #2ab4c8
color13  #8080d0
color14  #6ecad8
color15  #c4d8e4

# ── Tab bar ──────────────────────────────────────────────────────────────
active_tab_foreground   #c4d8e4
active_tab_background   #0e1622
inactive_tab_foreground #607888
inactive_tab_background #06080e
tab_bar_background      #06080e

# ── Window border ────────────────────────────────────────────────────────
active_border_color     #2ab4c8
inactive_border_color   #1a3448
bell_border_color        #c86418

