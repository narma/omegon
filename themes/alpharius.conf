# Alpharius — Alpha Legion terminal theme for Kitty
# Generated from themes/alpharius.json by scripts/export-kitty-theme.ts
# Do not edit manually — re-run the script after palette changes.
#
# Usage:
#   cp themes/alpharius.conf ~/.config/kitty/themes/alpharius.conf
#   then in kitty.conf: include themes/alpharius.conf

# ── Core palette ─────────────────────────────────────────────────────────
background            #0d1420
foreground            #c4d8e4

# ── Cursor ───────────────────────────────────────────────────────────────
cursor                #2ab4c8
cursor_text_color     #0d1420

# ── Selection ────────────────────────────────────────────────────────────
selection_background  #102030
selection_foreground  #c4d8e4

# ── URL underline colour ─────────────────────────────────────────────────
url_color             #1a8898

# ── ANSI 16-colour palette ───────────────────────────────────────────────
# Mapped to alpharius semantic roles so shell prompts and system tools
# (oh-my-bash, ls, git diff) align with the alpharius colour vocabulary.

color0   #0d1420
color1   #c83030
color2   #1ab878
color3   #78b820
color4   #1a8898
color5   #6060c0
color6   #4aa8c0
color7   #607888
color8   #405870
color9   #e04040
color10  #20d890
color11  #a0d030
color12  #2ab4c8
color13  #8080d0
color14  #6ecad8
color15  #c4d8e4

# ── Tab bar ──────────────────────────────────────────────────────────────
active_tab_foreground   #c4d8e4
active_tab_background   #131d2c
inactive_tab_foreground #607888
inactive_tab_background #0d1420
tab_bar_background      #0d1420

# ── Window border ────────────────────────────────────────────────────────
active_border_color     #2ab4c8
inactive_border_color   #1e3a50
bell_border_color        #c86418

