name: Docs confusion
description: Report a doc page, example, or getting-started path that is unclear or misleading.
title: "[docs]: "
labels:
  - docs
body:
  - type: input
    id: page
    attributes:
      label: Which page or guide is confusing?
      placeholder: "Example: /docs/get-started/claude"
    validations:
      required: true
  - type: textarea
    id: confusion
    attributes:
      label: What was confusing or misleading?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect the page to help you do?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: What wording, screenshot, or example would have helped?
