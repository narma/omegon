name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache pi-mono node_modules
        uses: actions/cache@v4
        with:
          path: vendor/pi-mono/node_modules
          key: pi-mono-${{ hashFiles('vendor/pi-mono/package.json') }}
          restore-keys: pi-mono-

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Check if publish needed
        id: check
        run: |
          LOCAL_VER=$(node -p "require('./package.json').version")
          NPM_VER=$(npm view omegon version 2>/dev/null || echo "0.0.0")
          echo "version=$LOCAL_VER" >> $GITHUB_OUTPUT
          if [ "$LOCAL_VER" = "$NPM_VER" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $LOCAL_VER already published — skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Publishing: $LOCAL_VER (npm has $NPM_VER)"
          fi

      - name: Tag release
        if: steps.check.outputs.skip == 'false'
        run: |
          TAG="v${{ steps.check.outputs.version }}"
          if ! git tag --list "$TAG" | grep -q "$TAG"; then
            git tag "$TAG"
            git push origin --tags
          fi

      - name: Install pi-mono publish dependencies
        if: steps.check.outputs.skip == 'false'
        run: |
          cd vendor/pi-mono
          rm -f package-lock.json
          npm install --ignore-scripts

      - name: Publish pi-mono fork packages
        if: steps.check.outputs.skip == 'false'
        run: bash scripts/publish-pi-mono.sh

      - name: Install Omegon publish dependencies
        if: steps.check.outputs.skip == 'false'
        run: npm install --ignore-scripts

      - name: Publish omegon
        if: steps.check.outputs.skip == 'false'
        run: npm publish --access public --provenance

      - name: Verify tarball is downloadable
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION=${{ steps.check.outputs.version }}
          TARBALL_URL="https://registry.npmjs.org/omegon/-/omegon-${VERSION}.tgz"
          echo "Verifying tarball at $TARBALL_URL"
          # 41MB+ tarball needs time to propagate across npm CDN
          for i in $(seq 1 12); do
            STATUS=$(curl -sI "$TARBALL_URL" -o /dev/null -w "%{http_code}")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Tarball verified (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/12: HTTP $STATUS — waiting 15s for CDN propagation..."
            sleep 15
          done
          echo "✗ Tarball still not available after 3 minutes. Unpublishing phantom version."
          npm unpublish "omegon@${VERSION}"
          echo "::error::npm publish reported success but tarball never propagated to CDN. Version ${VERSION} has been unpublished. Re-run this workflow to retry."
          exit 1
