name: Build & Push omegon-site

on:
  push:
    branches: [main]
    paths:
      - 'core/site/**'
      - 'core/install.sh'
      - 'CHANGELOG.md'
      - 'site/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'docs/**'
      - 'openspec/baseline/**'
  release:
    types: [published]

jobs:
  pages:
    name: Build & deploy Pages variants
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        run: cd site && npm ci

      - name: Build design tree SVG
        run: cd site && node scripts/build-design-tree.mjs

      - name: Build stable public site
        run: |
          cp core/install.sh site/public/install.sh
          cd site
          PUBLIC_SITE_VARIANT=stable \
          PUBLIC_SITE_URL=https://omegon.styrene.io \
          PUBLIC_PREVIEW_SITE_URL=https://omegon.styrene.dev \
          npx astro build
          rm -rf ../site-dist-stable
          cp -R dist ../site-dist-stable

      - name: Build preview staging site
        run: |
          cp core/install.sh site/public/install.sh
          cd site
          PUBLIC_SITE_VARIANT=preview \
          PUBLIC_SITE_URL=https://omegon.styrene.dev \
          PUBLIC_PREVIEW_SITE_URL=https://omegon.styrene.dev \
          npx astro build
          rm -rf ../site-dist-preview
          cp -R dist ../site-dist-preview

      - name: Deploy stable Pages project
        run: |
          npx wrangler@latest pages project create omegon-styrene-io --production-branch main 2>&1 || true
          npx wrangler@latest pages deploy site-dist-stable --project-name omegon-styrene-io --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy preview Pages project
        run: |
          npx wrangler@latest pages project create omegon-styrene-dev --production-branch main 2>&1 || true
          npx wrangler@latest pages deploy site-dist-preview --project-name omegon-styrene-dev --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Add stable custom domain
        if: github.ref == 'refs/heads/main'
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/omegon-styrene-io/domains" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"omegon.styrene.io"}' | python3 -c "
          import json,sys
          r=json.load(sys.stdin)
          errs=[e for e in r.get('errors',[]) if e.get('code') not in (8000018,8000019)]
          sys.exit(1 if errs else 0)
          "
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Add preview custom domain
        if: github.ref == 'refs/heads/main'
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/omegon-styrene-dev/domains" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"omegon.styrene.dev"}' | python3 -c "
          import json,sys
          r=json.load(sys.stdin)
          errs=[e for e in r.get('errors',[]) if e.get('code') not in (8000018,8000019)]
          sys.exit(1 if errs else 0)
          "
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Summary
        run: |
          echo "### Pages Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Stable:** omegon.styrene.io from \\`site-dist-stable\\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Preview:** omegon.styrene.dev from \\`site-dist-preview\\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Stable pages:** $(find site-dist-stable -name '*.html' | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- **Preview pages:** $(find site-dist-preview -name '*.html' | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

  container:
    name: Build & push site container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        run: cd site && npm ci

      - name: Build design tree SVG
        run: cd site && node scripts/build-design-tree.mjs

      - name: Build stable site for container bundle
        run: |
          cp core/install.sh site/public/install.sh
          cd site
          PUBLIC_SITE_VARIANT=stable \
          PUBLIC_SITE_URL=https://omegon.styrene.io \
          PUBLIC_PREVIEW_SITE_URL=https://omegon.styrene.dev \
          npx astro build

      - name: Prepare container build context
        run: |
          cp core/install.sh core/site/install.sh
          rm -rf core/site/docs-dist
          cp -r site/dist core/site/docs-dist

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: core/site
          file: core/site/Containerfile
          push: true
          no-cache: true
          tags: |
            ghcr.io/styrene-lab/omegon-site:sha-${{ github.sha }}
            ghcr.io/styrene-lab/omegon-site:latest

      - name: Update vanderlyn kustomization (direct git push)
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          NEW_TAG: sha-${{ github.sha }}
        run: |
          git clone --depth=1 https://x-access-token:${GH_TOKEN}@github.com/cwilson613/vanderlyn.git /tmp/vanderlyn
          cd /tmp/vanderlyn
          git config user.name "omegon[bot]"
          git config user.email "noreply@styrene.dev"

          sed -i "s|newTag: sha-.*|newTag: ${NEW_TAG}|" apps/omegon-site/kustomization.yaml

          if git diff --exit-code --quiet; then
            echo "No changes needed"
          else
            git add apps/omegon-site/kustomization.yaml
            git commit -m "chore(omegon-site): deploy ${NEW_TAG}"
            git push origin main
          fi

      - name: Summary
        run: |
          echo "### Site Container" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`ghcr.io/styrene-lab/omegon-site:sha-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Pages bundled:** $(find site/dist -name '*.html' | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- **Design tree nodes:** $(grep -c '<circle' site/public/design-tree.svg)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
