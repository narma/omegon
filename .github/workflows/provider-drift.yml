name: Provider API Drift Check

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # manual trigger

permissions:
  contents: read
  issues: write

jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pi-mono dependencies (for SDK packages)
        run: cd vendor/pi-mono && npm ci --ignore-scripts

      - name: Check provider API drift
        id: drift
        run: |
          ./scripts/check-provider-drift.sh 2>&1 | tee /tmp/drift-report.txt
        continue-on-error: true

      - name: Create issue on drift
        if: steps.drift.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/drift-report.txt', 'utf8');
            const title = `⚠️ Provider API drift detected — ${new Date().toISOString().slice(0,10)}`;

            // Check if an open issue already exists
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'provider-drift',
              state: 'open',
            });

            if (existing.data.length > 0) {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Daily drift check update:\n\n\`\`\`\n${report}\n\`\`\``,
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `The daily provider API drift check detected changes in the upstream SDK contracts.\n\n\`\`\`\n${report}\n\`\`\`\n\n## Action Required\n\n1. Review the drift report above\n2. Update Rust clients: \`core/crates/omegon/src/providers.rs\` and \`auth.rs\`\n3. Update baseline: \`./scripts/extract-provider-contracts.sh > .pi/provider-contracts.json\`\n4. Commit and push`,
                labels: ['provider-drift', 'automated'],
              });
            }
