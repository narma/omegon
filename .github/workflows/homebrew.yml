name: Update Homebrew formula

on:
  release:
    types: [published]

jobs:
  update-formula:
    # Only update on stable releases (no -rc.)
    if: "!contains(github.ref_name, '-rc.')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get release info
        id: release
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT

      - name: Download release manifest
        run: |
          curl -fsSL "https://github.com/styrene-lab/omegon/releases/download/${{ steps.release.outputs.tag }}/release-manifest.json" \
            -o release-manifest.json
          cat release-manifest.json

      - name: Update formula
        run: |
          python3 scripts/release_manifest.py update-homebrew \
            --manifest release-manifest.json \
            --formula homebrew/Formula/omegon.rb

          cat homebrew/Formula/omegon.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add homebrew/Formula/omegon.rb
          git commit -m "chore(brew): update formula to ${{ steps.release.outputs.version }}" || exit 0
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
