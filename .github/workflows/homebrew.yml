name: Update Homebrew formula

on:
  release:
    types: [published]

jobs:
  update-formula:
    # Only update on stable releases (no -rc.)
    if: "!contains(github.ref_name, '-rc.')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get release info
        id: release
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT

      - name: Download checksums
        run: |
          curl -fsSL "https://github.com/styrene-lab/omegon/releases/download/${{ steps.release.outputs.tag }}/checksums.sha256" \
            -o checksums.sha256
          cat checksums.sha256

      - name: Extract SHA256 hashes
        id: sha
        run: |
          VERSION=${{ steps.release.outputs.version }}
          DARWIN_ARM=$(grep "aarch64-apple-darwin" checksums.sha256 | awk '{print $1}')
          DARWIN_X86=$(grep "x86_64-apple-darwin" checksums.sha256 | awk '{print $1}')
          LINUX_ARM=$(grep "aarch64-unknown-linux-gnu" checksums.sha256 | awk '{print $1}')
          LINUX_X86=$(grep "x86_64-unknown-linux-gnu" checksums.sha256 | awk '{print $1}')
          echo "darwin_arm=$DARWIN_ARM" >> $GITHUB_OUTPUT
          echo "darwin_x86=$DARWIN_X86" >> $GITHUB_OUTPUT
          echo "linux_arm=$LINUX_ARM" >> $GITHUB_OUTPUT
          echo "linux_x86=$LINUX_X86" >> $GITHUB_OUTPUT

      - name: Update formula
        run: |
          VERSION=${{ steps.release.outputs.version }}
          FORMULA=homebrew/Formula/omegon.rb

          # Update version
          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA"

          # Update SHA256 hashes (in order: darwin-arm, darwin-x86, linux-arm, linux-x86)
          python3 -c "
          import re
          with open('$FORMULA') as f:
              content = f.read()
          shas = ['${{ steps.sha.outputs.darwin_arm }}',
                  '${{ steps.sha.outputs.darwin_x86 }}',
                  '${{ steps.sha.outputs.linux_arm }}',
                  '${{ steps.sha.outputs.linux_x86 }}']
          idx = 0
          def replace_sha(m):
              global idx
              result = f'sha256 \"{shas[idx]}\"'
              idx += 1
              return result
          content = re.sub(r'sha256 \"[A-Fa-f0-9]+\"', replace_sha, content)
          content = re.sub(r'sha256 \"PLACEHOLDER\"', replace_sha, content)
          with open('$FORMULA', 'w') as f:
              f.write(content)
          "

          cat "$FORMULA"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add homebrew/Formula/omegon.rb
          git commit -m "chore(brew): update formula to ${{ steps.release.outputs.version }}" || exit 0
          git push
