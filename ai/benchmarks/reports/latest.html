<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Omegon Benchmark Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #020408;
      --card: #040a12;
      --surface: #020408;
      --primary: #2ab4c8;
      --primary-muted: #1a8898;
      --primary-bright: #6ecad8;
      --fg: #c4d8e4;
      --muted: #6c8898;
      --dim: #48647c;
      --border: #285c74;
      --border-dim: #245068;
      --green: #1ab878;
      --red: #e04848;
      --orange: #c86418;
      --yellow: #78b820;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.45;
    }
    .wrap { max-width: 1600px; margin: 0 auto; padding: 24px; }
    .hero {
      background: linear-gradient(180deg, rgba(42,180,200,0.10), rgba(4,10,18,0.95));
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 20px;
      box-shadow: 0 0 0 1px rgba(42,180,200,0.06) inset;
    }
    h1,h2,h3 { margin: 0 0 12px 0; }
    h1 { color: var(--primary-bright); font-size: 28px; }
    h2 { color: var(--primary); font-size: 18px; margin-top: 24px; }
    h3 { color: var(--primary-muted); font-size: 15px; }
    .meta { color: var(--muted); font-size: 13px; display: flex; flex-wrap: wrap; gap: 16px; }
    .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 16px; }
    .card {
      grid-column: span 12;
      background: var(--card);
      border: 1px solid var(--border-dim);
      border-radius: 12px;
      padding: 16px;
    }
    .metric-grid { display: grid; grid-template-columns: repeat(6, minmax(0,1fr)); gap: 12px; }
    .metric { background: rgba(2,6,16,0.85); border: 1px solid var(--border-dim); border-radius: 10px; padding: 12px; }
    .metric .label { color: var(--muted); font-size: 12px; }
    .metric .value { color: var(--fg); font-size: 22px; margin-top: 6px; }
    .half { grid-column: span 6; }
    .third { grid-column: span 4; }
    .canvas-wrap { position: relative; height: 340px; }
    .task-box { background: rgba(3,7,14,0.9); border: 1px solid var(--border-dim); border-radius: 10px; padding: 12px; white-space: pre-wrap; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border-dim); vertical-align: top; }
    th { color: var(--primary-bright); font-weight: 600; }
    td { color: var(--fg); }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); color: var(--primary-bright); font-size: 12px; margin-right: 6px; margin-bottom: 6px; }
    .ok { color: var(--green); }
    .warn { color: var(--orange); }
    .bad { color: var(--red); }
    @media (max-width: 1100px) { .half, .third { grid-column: span 12; } .metric-grid { grid-template-columns: repeat(2, minmax(0,1fr)); } }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1 id="title"></h1>
      <div class="meta">
        <div><strong>Git</strong>: <span id="gitSha"></span></div>
        <div><strong>Input</strong>: <span id="inputDir"></span></div>
        <div><strong>Generated</strong>: <span id="generatedAt"></span></div>
      </div>
    </section>

    <section class="card">
      <h2>Run Set Summary</h2>
      <div class="metric-grid" id="metrics"></div>
    </section>

    <section class="grid">
      <div class="card half">
        <h2>Tasks Under Test</h2>
        <div id="taskDefs"></div>
      </div>
      <div class="card half">
        <h2>Included Harnesses / Models</h2>
        <h3>Harnesses</h3>
        <div id="harnessTags"></div>
        <h3>Models</h3>
        <div id="modelTags"></div>
        <h3>Providers</h3>
        <div id="providerTags"></div>
      </div>

      <div class="card half">
        <h2>Tokens vs Wall Clock</h2>
        <div class="canvas-wrap"><canvas id="scatterChart"></canvas></div>
      </div>
      <div class="card half">
        <h2>Turn Count by Harness / Model</h2>
        <div class="canvas-wrap"><canvas id="turnChart"></canvas></div>
      </div>

      <div class="card half">
        <h2>Token Composition</h2>
        <div class="canvas-wrap"><canvas id="tokenStackChart"></canvas></div>
      </div>
      <div class="card half">
        <h2>Process Metrics</h2>
        <div class="canvas-wrap"><canvas id="processChart"></canvas></div>
      </div>

      <div class="card">
        <h2>Run Matrix</h2>
        <table>
          <thead>
            <tr>
              <th>Task</th><th>Kind</th><th>Harness</th><th>Model</th><th>Status</th><th>Score</th><th>Wall</th><th>Total Tokens</th><th>Turns</th><th>Orientation</th><th>Nudges</th><th>File</th>
            </tr>
          </thead>
          <tbody id="runTable"></tbody>
        </table>
      </div>
    </section>
  </div>

<script>
const TITLE = "Omegon Benchmark Dashboard";
const INPUT_DIR = "ai/benchmarks/runs";
const GIT_SHA = "3b1e1c81";
const GENERATED_AT = "2026-04-11 16:55:23Z";
const DATA = {"rows": [{"file": "2026-04-11T16-12-23Z-controller-research-repair-omegon.json", "task_id": "controller-research-repair", "task_kind": "implementation", "prompt": "Tighten the turn controller so it stops falsely escalating on narrowly targeted inspection while still escalating genuine broad orientation churn. Preserve the execution-bias behavior for headless runs, but reduce false-positive pressure against single-file, evidence-backed local inspection.\n", "base_ref": "f03c031df30c063f87038d4124705dec57e18f77", "repo": ".", "harness": "omegon", "model": "anthropic:claude-sonnet-4-6", "provider": "anthropic", "status": "pass", "score": 1.0, "wall_clock_sec": 378.65, "input_tokens": 262517, "output_tokens": 6214, "cache_tokens": 64784, "cache_write_tokens": 8098, "total_tokens": 341613, "turn_count": 9, "orientation_only_turns": 1, "progress_nudge_count": 1, "tool_continuation_turns": 8, "assistant_completed_turns": 1}, {"file": "2026-04-11T16-15-54Z-controller-research-repair-om.json", "task_id": "controller-research-repair", "task_kind": "implementation", "prompt": "Tighten the turn controller so it stops falsely escalating on narrowly targeted inspection while still escalating genuine broad orientation churn. Preserve the execution-bias behavior for headless runs, but reduce false-positive pressure against single-file, evidence-backed local inspection.\n", "base_ref": "f03c031df30c063f87038d4124705dec57e18f77", "repo": ".", "harness": "om", "model": "anthropic:claude-sonnet-4-6", "provider": "anthropic", "status": "pass", "score": 1.0, "wall_clock_sec": 209.063, "input_tokens": 385834, "output_tokens": 5396, "cache_tokens": 53180, "cache_write_tokens": 5318, "total_tokens": 449728, "turn_count": 11, "orientation_only_turns": 2, "progress_nudge_count": 2, "tool_continuation_turns": 10, "assistant_completed_turns": 1}, {"file": "2026-04-11T16-22-19Z-controller-research-repair-claude-code.json", "task_id": "controller-research-repair", "task_kind": "implementation", "prompt": "Tighten the turn controller so it stops falsely escalating on narrowly targeted inspection while still escalating genuine broad orientation churn. Preserve the execution-bias behavior for headless runs, but reduce false-positive pressure against single-file, evidence-backed local inspection.\n", "base_ref": "f03c031df30c063f87038d4124705dec57e18f77", "repo": ".", "harness": "claude-code", "model": "claude-sonnet-4-6", "provider": null, "status": "pass", "score": 1.0, "wall_clock_sec": 382.452, "input_tokens": 27, "output_tokens": 11401, "cache_tokens": 977305, "cache_write_tokens": 55494, "total_tokens": 1044227, "turn_count": null, "orientation_only_turns": 0, "progress_nudge_count": 0, "tool_continuation_turns": 0, "assistant_completed_turns": 0}, {"file": "2026-04-11T16-38-16Z-controller-research-repair-pi.json", "task_id": "controller-research-repair", "task_kind": "implementation", "prompt": "Tighten the turn controller so it stops falsely escalating on narrowly targeted inspection while still escalating genuine broad orientation churn. Preserve the execution-bias behavior for headless runs, but reduce false-positive pressure against single-file, evidence-backed local inspection.\n", "base_ref": "f03c031df30c063f87038d4124705dec57e18f77", "repo": ".", "harness": "pi", "model": "claude-sonnet-4-6", "provider": null, "status": "pass", "score": 1.0, "wall_clock_sec": 568.445, "input_tokens": 1, "output_tokens": 463, "cache_tokens": 0, "cache_write_tokens": 50235, "total_tokens": 50699, "turn_count": null, "orientation_only_turns": 0, "progress_nudge_count": 0, "tool_continuation_turns": 0, "assistant_completed_turns": 0}, {"file": "2026-04-11T16-46-14Z-auth-daemon-robustness-omegon.json", "task_id": "auth-daemon-robustness", "task_kind": "implementation", "prompt": "Make remote auth logout robust for canonical provider aliases and ensure the daemon control plane still starts even when no executable LLM provider is configured. Keep the control plane available so remote tooling and blackbox tests can attach, and make logout safe to invoke even when the provider is already effectively logged out.\n", "base_ref": "d2178aafb94263616c6574d26804f72520efb4a5", "repo": ".", "harness": "omegon", "model": "anthropic:claude-sonnet-4-6", "provider": "anthropic", "status": "fail", "score": 0.0, "wall_clock_sec": 474.282, "input_tokens": 1133779, "output_tokens": 12201, "cache_tokens": 259136, "cache_write_tokens": 8098, "total_tokens": 1413214, "turn_count": 33, "orientation_only_turns": 0, "progress_nudge_count": 0, "tool_continuation_turns": 32, "assistant_completed_turns": 1}, {"file": "2026-04-11T16-50-28Z-auth-daemon-robustness-om.json", "task_id": "auth-daemon-robustness", "task_kind": "implementation", "prompt": "Make remote auth logout robust for canonical provider aliases and ensure the daemon control plane still starts even when no executable LLM provider is configured. Keep the control plane available so remote tooling and blackbox tests can attach, and make logout safe to invoke even when the provider is already effectively logged out.\n", "base_ref": "d2178aafb94263616c6574d26804f72520efb4a5", "repo": ".", "harness": "om", "model": "anthropic:claude-sonnet-4-6", "provider": "anthropic", "status": "fail", "score": 0.0, "wall_clock_sec": 251.716, "input_tokens": 1031039, "output_tokens": 7552, "cache_tokens": 111310, "cache_write_tokens": 10580, "total_tokens": 1160481, "turn_count": 23, "orientation_only_turns": 0, "progress_nudge_count": 0, "tool_continuation_turns": 22, "assistant_completed_turns": 1}], "task_ids": ["auth-daemon-robustness", "controller-research-repair"], "harnesses": ["claude-code", "om", "omegon", "pi"], "models": ["anthropic:claude-sonnet-4-6", "claude-sonnet-4-6"], "providers": ["anthropic"], "statuses": {"pass": 4, "fail": 2}, "prompts": {"controller-research-repair": "Tighten the turn controller so it stops falsely escalating on narrowly targeted inspection while still escalating genuine broad orientation churn. Preserve the execution-bias behavior for headless runs, but reduce false-positive pressure against single-file, evidence-backed local inspection.\n", "auth-daemon-robustness": "Make remote auth logout robust for canonical provider aliases and ensure the daemon control plane still starts even when no executable LLM provider is configured. Keep the control plane available so remote tooling and blackbox tests can attach, and make logout safe to invoke even when the provider is already effectively logged out.\n"}, "kinds": {"controller-research-repair": "implementation", "auth-daemon-robustness": "implementation"}, "base_refs": {"controller-research-repair": "f03c031df30c063f87038d4124705dec57e18f77", "auth-daemon-robustness": "d2178aafb94263616c6574d26804f72520efb4a5"}};

document.getElementById('title').textContent = TITLE;
document.getElementById('gitSha').textContent = GIT_SHA;
document.getElementById('inputDir').textContent = INPUT_DIR;
document.getElementById('generatedAt').textContent = GENERATED_AT;

const rows = DATA.rows || [];
const metrics = [
  ['Runs', rows.length],
  ['Tasks', (DATA.task_ids || []).length],
  ['Harnesses', (DATA.harnesses || []).length],
  ['Models', (DATA.models || []).length],
  ['Providers', (DATA.providers || []).length],
  ['Passes', (DATA.statuses && DATA.statuses.pass) || 0],
];
const metricsEl = document.getElementById('metrics');
for (const [label, value] of metrics) {
  const div = document.createElement('div');
  div.className = 'metric';
  div.innerHTML = `<div class="label">${label}</div><div class="value">${value}</div>`;
  metricsEl.appendChild(div);
}

function addTags(id, items) {
  const el = document.getElementById(id);
  for (const item of items || []) {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = item;
    el.appendChild(span);
  }
}
addTags('harnessTags', DATA.harnesses || []);
addTags('modelTags', DATA.models || []);
addTags('providerTags', DATA.providers || []);

const taskDefs = document.getElementById('taskDefs');
for (const taskId of DATA.task_ids || []) {
  const box = document.createElement('div');
  box.className = 'task-box';
  const kind = (DATA.kinds || {})[taskId] || 'unknown';
  const baseRef = (DATA.base_refs || {})[taskId] || 'unknown';
  const prompt = (DATA.prompts || {})[taskId] || '';
  box.innerHTML = `<strong>${taskId}</strong> <span class="tag">${kind}</span> <span class="tag">base:${baseRef}</span>

${prompt}`;
  taskDefs.appendChild(box);
}

const runTable = document.getElementById('runTable');
for (const row of rows) {
  const tr = document.createElement('tr');
  const statusClass = row.status === 'pass' ? 'ok' : (row.status === 'fail' ? 'bad' : 'warn');
  tr.innerHTML = `
    <td>${row.task_id || ''}</td>
    <td>${row.task_kind || ''}</td>
    <td>${row.harness || ''}</td>
    <td>${row.model || ''}</td>
    <td class="${statusClass}">${row.status || ''}</td>
    <td>${row.score ?? ''}</td>
    <td>${row.wall_clock_sec ?? ''}</td>
    <td>${row.total_tokens ?? ''}</td>
    <td>${row.turn_count ?? ''}</td>
    <td>${row.orientation_only_turns ?? 0}</td>
    <td>${row.progress_nudge_count ?? 0}</td>
    <td>${row.file || ''}</td>`;
  runTable.appendChild(tr);
}

const alpharius = {
  fg: '#c4d8e4',
  muted: '#6c8898',
  border: '#285c74',
  primary: '#2ab4c8',
  primaryBright: '#6ecad8',
  primaryMuted: '#1a8898',
  green: '#1ab878',
  red: '#e04848',
  orange: '#c86418',
  yellow: '#78b820'
};

Chart.defaults.color = alpharius.fg;
Chart.defaults.borderColor = alpharius.border;
Chart.defaults.font.family = 'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace';

const pointColors = rows.map(r => r.harness === 'omegon' ? alpharius.primary : r.harness === 'om' ? alpharius.primaryMuted : r.harness === 'claude-code' ? alpharius.orange : alpharius.yellow);

new Chart(document.getElementById('scatterChart'), {
  type: 'scatter',
  data: {
    datasets: [{
      label: 'Runs',
      data: rows.filter(r => typeof r.total_tokens === 'number' && typeof r.wall_clock_sec === 'number').map(r => ({ x: r.total_tokens, y: r.wall_clock_sec, label: `${r.harness} / ${r.model} / ${r.task_id}` })),
      backgroundColor: pointColors,
      borderColor: pointColors,
      pointRadius: 6,
    }]
  },
  options: {
    plugins: { tooltip: { callbacks: { label: (ctx) => ctx.raw.label + ` — tokens:${ctx.raw.x} wall:${ctx.raw.y}s` } } },
    scales: { x: { title: { display: true, text: 'Total Tokens' } }, y: { title: { display: true, text: 'Wall Clock (s)' } } }
  }
});

const labels = rows.map(r => `${r.harness}
${(r.model || '').replace('anthropic:','').replace('openai-codex:','')}`);
new Chart(document.getElementById('turnChart'), {
  type: 'bar',
  data: { labels, datasets: [{ label: 'Turns', data: rows.map(r => r.turn_count || 0), backgroundColor: pointColors }] },
  options: { responsive: true, plugins: { legend: { display: false } } }
});

new Chart(document.getElementById('tokenStackChart'), {
  type: 'bar',
  data: {
    labels,
    datasets: [
      { label: 'Input', data: rows.map(r => r.input_tokens || 0), backgroundColor: alpharius.primary },
      { label: 'Output', data: rows.map(r => r.output_tokens || 0), backgroundColor: alpharius.green },
      { label: 'Cache', data: rows.map(r => r.cache_tokens || 0), backgroundColor: alpharius.yellow },
      { label: 'Cache Write', data: rows.map(r => r.cache_write_tokens || 0), backgroundColor: alpharius.orange },
    ]
  },
  options: { responsive: true, scales: { x: { stacked: true }, y: { stacked: true } } }
});

new Chart(document.getElementById('processChart'), {
  type: 'bar',
  data: {
    labels,
    datasets: [
      { label: 'Orientation Turns', data: rows.map(r => r.orientation_only_turns || 0), backgroundColor: alpharius.red },
      { label: 'Progress Nudges', data: rows.map(r => r.progress_nudge_count || 0), backgroundColor: alpharius.orange },
      { label: 'Tool Continuation Turns', data: rows.map(r => r.tool_continuation_turns || 0), backgroundColor: alpharius.primaryMuted },
      { label: 'Assistant Completed Turns', data: rows.map(r => r.assistant_completed_turns || 0), backgroundColor: alpharius.green },
    ]
  },
  options: { responsive: true, scales: { x: { stacked: false }, y: { beginAtZero: true } } }
});
</script>
</body>
</html>
